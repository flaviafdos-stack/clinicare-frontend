<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacientes - CliniCare</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-tooth"></i> CliniCare</h2>
                <p>Sistema de Gestão</p>
            </div>
            
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="menu-item">
                    <i class="fas fa-home"></i> Dashboard
                </a>
                <a href="pacientes.html" class="menu-item active">
                    <i class="fas fa-users"></i> Pacientes
                </a>
                <a href="agenda.html" class="menu-item">
                    <i class="fas fa-calendar-alt"></i> Agenda
                </a>
                <a href="crm.html" class="menu-item">
                    <i class="fas fa-chart-line"></i> CRM
                </a>
                <a href="financeiro.html" class="menu-item">
                    <i class="fas fa-dollar-sign"></i> Financeiro
                </a>
                <a href="estoque.html" class="menu-item">
                    <i class="fas fa-boxes"></i> Estoque
                </a>
                <a href="locatarios.html" class="menu-item">
                    <i class="fas fa-user-tie"></i> Locatários
                </a>
                <a href="metas.html" class="menu-item">
                    <i class="fas fa-bullseye"></i> Metas
                </a>
                <a href="whatsapp.html" class="menu-item">
                    <i class="fab fa-whatsapp"></i> WhatsApp
                </a>
                <a href="pops.html" class="menu-item">
                    <i class="fas fa-clipboard-list"></i> POPs
                </a>
            </nav>

            <div class="sidebar-footer">
                <button onclick="logout()" class="btn btn-danger btn-block">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="page-header">
                <div>
                    <h1>Gestão de Pacientes</h1>
                    <p>Cadastro e gerenciamento de pacientes</p>
                </div>
                <div>
                    <button onclick="abrirModalPaciente()" class="btn btn-primary" id="btnNovoPaciente">
                        <i class="fas fa-plus"></i> Novo Paciente
                    </button>
                </div>
            </header>

            <!-- Search Bar -->
            <div class="card">
                <div class="card-body">
                    <div class="search-container">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Buscar por nome, CPF, telefone ou email...">
                    </div>
                </div>
            </div>

            <!-- Patients Table -->
            <div class="card">
                <div class="card-header">
                    <h3><i class="fas fa-users"></i> Lista de Pacientes</h3>
                </div>
                <div class="card-body">
                    <div class="table-container">
                        <table id="tabelaPacientes">
                            <thead>
                                <tr>
                                    <th>Nome</th>
                                    <th>CPF</th>
                                    <th>Telefone</th>
                                    <th>Email</th>
                                    <th>Cadastro</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Será preenchido dinamicamente -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/supabase-config.js"></script>
    <script src="js/menu-beautifier.js"></script>
    <script src="js/auth-simple.js"></script>
    <script src="js/pacientes-supabase.js"></script>
    <script>
        // Verifica autenticação
        const currentUser = checkAuth();
        
        // Funções para gerar documentos
        function gerarPedidoExames() {
            const pacienteId = document.getElementById('pacNome')?.dataset?.pacienteId;
            if (!pacienteId) {
                alert('Por favor, selecione um paciente primeiro.');
                return;
            }
            window.open(`pedido-exames-pre-operatorio.html?paciente=${pacienteId}`, '_blank');
        }

        function gerarReceituario() {
            const pacienteId = document.getElementById('pacNome')?.dataset?.pacienteId;
            if (!pacienteId) {
                alert('Por favor, selecione um paciente primeiro.');
                return;
            }
            window.open(`receituario-digital.html?paciente=${pacienteId}`, '_blank');
        }

        function gerarAtestado() {
            const pacienteId = document.getElementById('pacNome')?.dataset?.pacienteId;
            if (!pacienteId) {
                alert('Por favor, selecione um paciente primeiro.');
                return;
            }
            window.open(`atestado-odontologico.html?paciente=${pacienteId}`, '_blank');
        }
    </script>
</body>
</html>
